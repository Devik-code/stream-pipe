# deny.toml — configuración de cargo-deny
#
# cargo-deny (negar — rechazar) es una herramienta que verifica dos cosas:
#   1. Licencias (permisos de uso) de las dependencias (librerías externas).
#   2. Vulnerabilidades (fallas de seguridad conocidas) en esas dependencias.
#
# Peras y manzanas:
#   Antes de usar código de otra persona en tu proyecto, hay que verificar
#   que tenés permiso legal para usarlo (licencia — contrato de uso)
#   y que ese código no tenga problemas de seguridad conocidos (vulnerabilidades).
#
# Uso: cargo deny check   (o: just -f tools/Justfile deny)

# ─────────────────────────────────────────────────────────────────
# LICENCIAS (permisos legales de uso del código)
# ─────────────────────────────────────────────────────────────────
[licenses]
# version = 2 usa el formato más moderno de configuración de licencias
version = 2

# allow = lista de licencias permitidas en las dependencias.
# Todas las librerías del ecosistema Rust usan principalmente MIT y Apache-2.0,
# que son licencias de software libre (open source — código abierto) permisivas
# (permiten usar, modificar y distribuir el código con pocas restricciones).
#
# MIT       → MIT License: la más permisiva, solo pide mantener el copyright
#             (derecho de autoría — crédito al autor original)
# Apache-2.0 → Apache License 2.0: similar a MIT pero con cláusulas sobre patentes
# Unicode-3.0 → licencia de la librería Unicode (manejo de texto internacional)
# ISC        → Internet Systems Consortium license: equivalente a MIT, más corta
# BSD-2-Clause → Berkeley Software Distribution: permisiva, similar a MIT
# BSD-3-Clause → igual que BSD-2 pero prohíbe usar el nombre del autor para publicidad
# OpenSSL    → licencia de OpenSSL (librería de criptografía — seguridad de datos)
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
    "BSD-3-Clause",
]

# ─────────────────────────────────────────────────────────────────
# ADVISORIES (avisos de seguridad — vulnerabilidades conocidas)
# ─────────────────────────────────────────────────────────────────
[advisories]
# version = 2 usa el formato moderno
version = 2

# unmaintained = qué dependencias abandonadas (sin mantenimiento activo) revisar.
# "all"         = revisar todas las dependencias (directas y transitivas)
# "workspace"   = solo las dependencias del workspace (espacio de trabajo — proyecto)
# "transitive"  = solo las dependencias transitivas (dependencias de dependencias)
# "none"        = no revisar dependencias abandonadas
unmaintained = "all"

# yanked = qué dependencias con versiones retiradas (yanked — removidas del
#          registro porque tenían bugs o problemas de seguridad) revisar.
yanked = "warn"

# ─────────────────────────────────────────────────────────────────
# BANS (prohibiciones — dependencias duplicadas o no deseadas)
# ─────────────────────────────────────────────────────────────────
[bans]
# multiple-versions = qué hacer cuando hay varias versiones de la misma librería.
# "warn" = advertir. En proyectos grandes es común tener duplicados temporales.
multiple-versions = "warn"

# ─────────────────────────────────────────────────────────────────
# SOURCES (fuentes — de dónde se descargan las dependencias)
# ─────────────────────────────────────────────────────────────────
[sources]
# unknown-registry = qué hacer con dependencias de registros (repositorios —
#                   servidores de librerías) desconocidos.
# "deny" = rechazar — solo permitimos crates.io (el registro oficial de Rust).
unknown-registry = "deny"

# unknown-git = qué hacer con dependencias descargadas directamente de git
#               (sistema de control de versiones) sin pasar por crates.io.
# "deny" = rechazar por defecto — más seguro.
unknown-git = "deny"
